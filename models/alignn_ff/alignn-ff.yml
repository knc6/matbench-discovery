# checkpoint is the default ALIGNN-FF force field shipped with the alignn package,
# loaded via alignn.ff.ff.default_path(), see https://github.com/usnistgov/alignn/tree/main/alignn/ff
checkpoint_url: https://github.com/usnistgov/alignn/raw/main/alignn/ff/best_model.pt

license:
  code: MIT
  code_url: https://github.com/usnistgov/alignn/blob/408bb6e996/LICENSE.rst
  checkpoint: MIT
  checkpoint_url: https://github.com/usnistgov/alignn/blob/408bb6e996/LICENSE.rst

requirements:
  alignn: 2024.5.27
  ase: 3.22.1
  dgl: 2.1.0
  numpy: 1.26.4
  pandas: 2.2.2
  torch: 2.2.1

openness: OSOD
train_task: S2EFS
test_task: IS2RE-SR
targets: EFS_G
model_type: UIP
model_params: 4_026_753
n_estimators: 1
trained_for_benchmark: false

training_set: [MPtrj]
training_cost: missing

hyperparams:
  max_force: 0.05
  max_steps: 500
  ase_optimizer: FIRE
  cell_filter: ExpCellFilter
  graph_construction_radius: 8.0 # Å, from Methodology section in arXiv:2209.05554
  max_neighbors: 12

notes:
  description: |
    ALIGNN-FF is a universal interatomic potential built on the ALIGNN (Atomistic Line Graph Neural
    Network) architecture, which jointly encodes the atom graph and its line graph (bond angles) for
    message passing. This submission uses the default ALIGNN-FF force field bundled with the `alignn`
    package, loaded via `alignn.ff.ff.default_path()` and exposed to ASE through
    `AlignnAtomwiseCalculator`.

